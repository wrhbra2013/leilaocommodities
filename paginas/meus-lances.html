<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Lances - Leilap Commodities</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content">
    <h1 class="page-title-lg">💰 Meus Lances</h1>
    <div id="lances-container">
      <div class="loading">Carregando seus lances</div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/static/js/api-client.js"></script>
  <script src="/static/js/helpers.js"></script>
  <script src="/static/js/components.js"></script>
  <script>
    async function init() {
      if (!API.token) { window.location.href = '/admin/login.html?redirect=' + encodeURIComponent(window.location.pathname); return; }
      const el = document.getElementById('lances-container');
      try {
        const r = await API.meusLances();
        const items = r.data || [];
        if (!items.length) {
          el.innerHTML = '<div class="alert alert-info">Você ainda não deu lances em nenhum leilão. <a href="/paginas/leiloes.html">Ver leilões ativos</a></div>';
          return;
        }
        el.innerHTML = items.map(item => {
          const l = item.leilao || {};
          const lances = [item];
          return '<div class="card" style="margin-bottom:1rem;" onclick="location.href=\'/paginas/leilao.html?id=' + encodeURIComponent(l.id || item.leilao_id) + '\'">' +
            '<div class="card-body">' +
            '<div class="flex-between">' +
            '<h3>' + html(l.titulo || 'Leilão') + '</h3>' +
            '<span class="tag ' + (l.status === 'ativo' ? 'tag-ativo' : 'tag-encerrado') + '">' + html(l.status || 'desconhecido') + '</span>' +
            '</div>' +
            '<div class="meta">' + html(l.comoditie_nome || '') + ' · ' + html(l.quantidade || '') + ' ' + html(l.unidade || '') + '</div>' +
            '<div class="mt-sm">' +
            '<strong>Seu lance:</strong> ' +
            '<span class="bid-badge">R$ ' + parseFloat(item.valor).toFixed(2) + '</span>' +
            '</div>' +
            '<div class="mt-sm text-muted text-sm">' + new Date(item.timestamp).toLocaleString('pt-BR') + '</div>' +
            '</div>' +
            '</div>';
        }).join('');
      } catch(e) {
        el.innerHTML = '<div class="alert alert-error">Erro ao carregar lances</div>';
      }
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
