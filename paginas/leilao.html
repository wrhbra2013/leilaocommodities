<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilão - Leilao Commodities</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <script>var basePath = '../';</script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content" id="leilao-container">
    <div class="loading">Carregando leilão</div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="modal" id="modal-lance">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fecharModal()">&times;</button>
      <h2>Dar Lance</h2>
      <div class="form-group">
        <label>Valor do lance (R$)</label>
        <input type="number" id="lance-valor" class="form-control" step="0.01" min="0" inputmode="decimal">
      </div>
      <button class="btn btn-primary w-full" onclick="confirmarLance()">Confirmar Lance</button>
      <div id="lance-status" class="mt-sm"></div>
    </div>
  </div>

  <script src="../static/js/components.js"></script>
  <script src="../static/js/api.js"></script>
</body>
</html>
