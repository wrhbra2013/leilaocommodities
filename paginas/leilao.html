<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leilão - Leilap Commodities</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content" id="leilao-container">
    <div class="loading">Carregando leilão</div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="modal" id="modal-lance">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fecharModal()">&times;</button>
      <h2>Dar Lance</h2>
      <div class="form-group">
        <label>Valor do lance (R$)</label>
        <input type="number" id="lance-valor" class="form-control" step="0.01" min="0" inputmode="decimal">
      </div>
      <button class="btn btn-primary w-full" onclick="confirmarLance()">Confirmar Lance</button>
      <div id="lance-status" class="mt-sm"></div>
    </div>
  </div>

  <script src="/static/js/api-client.js"></script>
  <script src="/static/js/helpers.js"></script>
  <script src="/static/js/components.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const leilaoId = params.get('id');
    let leilao = null;
    let timerInterval = null;

    async function init() {
      if (!leilaoId) { document.getElementById('leilao-container').innerHTML = '<p>Leilão não encontrado</p>'; return; }
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      leilao = await API.getLeilao(leilaoId);
      renderizar();
    }

    function renderizar() {
      const l = leilao;
      const ativo = l.status === 'ativo';
      const fim = new Date(l.data_fim);
      const encerrado = new Date() > fim;
      const tag = encerrado ? 'Encerrado' : (ativo ? 'Ativo' : l.status);

      document.getElementById('leilao-container').innerHTML = `
        <div class="leilao-header">
          <span class="icon-xl">${html(l.icone || '📦')}</span>
          <h1>${html(l.titulo)}</h1>
          <p>${html(l.descricao || '')}</p>
          <div class="mt-md">
            <span class="text-sm opacity-75">${html(l.comoditie_nome)} · ${html(l.quantidade)} ${html(l.unidade)}</span>
          </div>
          <div class="preco-atual">R$ ${parseFloat(l.preco_atual).toFixed(2)}</div>
          <div class="timer" id="timer">${encerrado ? '🔴 Encerrado' : '⏳ Tempo restante: calculando...'}</div>
          ${ativo && !encerrado ? `<button class="btn btn-warning btn-lg mt-md" onclick="abrirModal()">💰 Dar Lance</button>` : ''}
        </div>

        <div class="leilao-info-grid">
          <div class="card"><div class="card-body">
            <div class="card-label">Preço Inicial</div>
            <div class="text-lg">R$ ${parseFloat(l.preco_inicial).toFixed(2)}</div>
          </div></div>
          <div class="card"><div class="card-body">
            <div class="card-label">Valor Mínimo por Lance</div>
            <div class="text-lg">R$ ${l.valor_minimo_lance ? parseFloat(l.valor_minimo_lance).toFixed(2) : 'Livre'}</div>
          </div></div>
          <div class="card"><div class="card-body">
            <div class="card-label">Início</div>
            <div class="text-value">${new Date(l.data_inicio).toLocaleString('pt-BR')}</div>
          </div></div>
          <div class="card"><div class="card-body">
            <div class="card-label">Término</div>
            <div class="text-value" id="data-fim">${new Date(l.data_fim).toLocaleString('pt-BR')}</div>
          </div></div>
        </div>

        <h2 class="page-title mb-md">📋 Lances</h2>
        ${l.lances && l.lances.length ? `
        <table>
          <thead><tr><th>#</th><th>Usuário</th><th>Valor</th><th>Data</th></tr></thead>
          <tbody>
            ${l.lances.map((lc, i) => `<tr>
              <td>${i + 1}</td>
              <td>${html(lc.usuario_nome)}</td>
              <td class="text-success">R$ ${parseFloat(lc.valor).toFixed(2)}</td>
              <td>${new Date(lc.timestamp).toLocaleString('pt-BR')}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p class="text-muted">Nenhum lance ainda. Seja o primeiro!</p>'}`;

      if (!encerrado && ativo) iniciarTimer(fim);
    }

    function iniciarTimer(fim) {
      function atualizar() {
        const diff = fim - new Date();
        if (diff <= 0) { document.getElementById('timer').textContent = '🔴 Encerrado'; return; }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').textContent = `⏳ ${d}d ${h}h ${m}m ${s}s`;
      }
      atualizar();
      timerInterval = setInterval(atualizar, 1000);
    }

    function abrirModal() {
      if (!API.token) { alert('Faça login para dar lances'); window.location.href = '/admin/login.html'; return; }
      document.getElementById('lance-valor').value = parseFloat(leilao.preco_atual) + (parseFloat(leilao.valor_minimo_lance) || 0.01);
      document.getElementById('modal-lance').classList.add('active');
    }

    function fecharModal() { document.getElementById('modal-lance').classList.remove('active'); }

    async function confirmarLance() {
      const valor = parseFloat(document.getElementById('lance-valor').value);
      if (!valor || valor <= 0) { document.getElementById('lance-status').innerHTML = '<div class="alert alert-error">Valor inválido</div>'; return; }
      const r = await API.criarLance(leilaoId, valor);
      if (r.success) {
        document.getElementById('lance-status').innerHTML = '<div class="alert alert-success">Lance registrado com sucesso!</div>';
        setTimeout(() => { fecharModal(); init(); }, 1000);
      } else {
        document.getElementById('lance-status').innerHTML = '<div class="alert alert-error">' + (r.error || 'Erro ao registrar lance') + '</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
