<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Leilão Commodities</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 4rem auto; background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .auth-container h1 { text-align: center; color: #1e3a5f; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1>📊 Criar Conta</h1>
    <div id="register-status"></div>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="reg-nome" class="form-control" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="reg-telefone" class="form-control" placeholder="(14) 99999-9999">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="reg-senha" class="form-control" placeholder="Min. 6 caracteres">
    </div>
    <button class="btn btn-success" onclick="cadastrar()" style="width:100%;">Criar Conta</button>
    <p style="text-align:center;margin-top:1rem;color:#888;">
      Já tem conta? <a href="/admin/login.html">Entrar</a>
    </p>
    <p style="text-align:center;margin-top:0.5rem;">
      <a href="/">← Voltar ao início</a>
    </p>
  </div>
  <script src="/static/js/api-client.js"></script>
  <script src="/static/js/helpers.js"></script>
  <script>
    async function cadastrar() {
      const nome = document.getElementById('reg-nome').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const telefone = document.getElementById('reg-telefone').value.trim();
      const senha = document.getElementById('reg-senha').value;
      if (!nome || !email || !senha) { document.getElementById('register-status').innerHTML = '<div class="alert alert-error">Preencha todos os campos obrigatórios</div>'; return; }
      if (senha.length < 6) { document.getElementById('register-status').innerHTML = '<div class="alert alert-error">Senha deve ter no mínimo 6 caracteres</div>'; return; }
      const r = await API.register(nome, email, telefone, senha);
      if (r.success) {
        API.setToken(r.token);
        localStorage.setItem('lcm_user', JSON.stringify(r.user));
        document.getElementById('register-status').innerHTML = '<div class="alert alert-success">Conta criada! Redirecionando...</div>';
        setTimeout(() => window.location.href = '/admin/index.html', 1000);
      } else {
        document.getElementById('register-status').innerHTML = '<div class="alert alert-error">' + (r.error || 'Erro ao cadastrar') + '</div>';
      }
    }
  </script>
</body>
</html>
