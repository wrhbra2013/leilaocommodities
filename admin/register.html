<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Leilão Commodities</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <script>var basePath = '../';</script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content">
  <div class="auth-container">
    <h1>Criar Conta</h1>
    <div id="register-status"></div>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="reg-nome" class="form-control" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="reg-telefone" class="form-control" placeholder="(14) 99999-9999">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="reg-senha" class="form-control" placeholder="Min. 6 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" id="reg-senha2" class="form-control" placeholder="Repita a senha">
    </div>
    <button class="btn btn-success w-full" onclick="cadastrar()">Criar Conta</button>
    <p class="text-center text-muted mt-md">
      Já tem conta?       <a href="login.html">Entrar</a>
    </p>
    <p class="text-center mt-sm">
      <a href="../index.html">← Voltar ao início</a>
    </p>
  </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/api.js"></script>
</body>
</html>
