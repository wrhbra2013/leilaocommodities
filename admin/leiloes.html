<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Leilões - Leilão Commodities</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <script>var basePath = '../';</script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content">
    <div class="flex-between mb-lg">
      <h1 class="page-title m-0">Gerenciar Leilões</h1>
      <button class="btn btn-success" onclick="abrirCriar()">+ Novo Leilão</button>
    </div>
    <div id="leiloes-list"><div class="loading">Carregando</div></div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="modal" id="modal-leilao">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fechar()">&times;</button>
      <h2 id="modal-title">Novo Leilão</h2>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="l-titulo" class="form-control">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="l-descricao" class="form-control" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Commoditie</label>
        <select id="l-comoditie" class="form-control"></select>
      </div>
      <div class="flex-row gap-md">
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="l-quantidade" class="form-control" value="1" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Preço Inicial (R$)</label>
          <input type="number" id="l-preco" class="form-control" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label>Valor mínimo lance (R$)</label>
        <input type="number" id="l-min-lance" class="form-control" step="0.01" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>Data de término</label>
        <input type="datetime-local" id="l-data-fim" class="form-control">
      </div>
      <div id="status"></div>
      <button class="btn btn-success w-full" onclick="salvar()" id="btn-salvar">Criar Leilão</button>
    </div>
  </div>

  <script src="../static/js/api-client.js"></script>
  <script src="../static/js/helpers.js"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/admin-modal.js"></script>
  <script>
    let comods = [];

    async function init() {
      const user = JSON.parse(localStorage.getItem('lcm_user') || '{}');
      if (!API.token || user.nivel !== 'admin') { window.location.href = 'login.html'; return; }
      comods = await API.getComodities();
      initAdminModal(comods);
      carregar();
    }

    async function carregar() {
      const r = await API.adminLeiloes();
      const ls = r.data || [];
      document.getElementById('leiloes-list').innerHTML = ls.length
        ? `<table>
          <thead><tr><th>Título</th><th>Commoditie</th><th>Preço</th><th>Lances</th><th>Status</th><th>Término</th><th>Ações</th></tr></thead>
          <tbody>${ls.map(l => `<tr>
            <td><a href="../paginas/leilao.html?id=${encodeURIComponent(l.id)}">${html(l.titulo)}</a></td>
            <td>${html(l.comoditie_nome)}</td>
            <td class="text-success">R$ ${parseFloat(l.preco_atual).toFixed(2)}</td>
            <td>${l.total_lances || 0}</td>
            <td><span class="tag ${l.status === 'ativo' ? 'tag-ativo' : 'tag-encerrado'}">${html(l.status)}</span></td>
            <td class="text-sm">${new Date(l.data_fim).toLocaleString('pt-BR')}</td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editar('${l.id}')">Editar</button>
              ${l.status === 'ativo' ? `<button class="btn btn-danger btn-sm" onclick="encerrar('${l.id}')">Encerrar</button>` : ''}
            </td>
          </tr>`).join('')}</tbody>
        </table>` : '<p class="text-muted">Nenhum leilão ainda</p>';
    }

    function abrirCriar() { modalAbrirCriar(); }

    async function editar(id) { modalEditar(id); }

    async function salvar() { modalSalvar(() => carregar()); }

    async function encerrar(id) {
      const ok = await modalEncerrar(id);
      if (ok) carregar();
    }

    function fechar() { modalFechar(); }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
