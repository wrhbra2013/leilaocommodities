<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Leilão Commodities</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content">
    <h1 style="color:#1e3a5f;margin-bottom:1.5rem;">📊 Painel Administrativo</h1>
    <div class="stats-grid" id="stats">
      <div class="stat-card"><div class="loading">Carregando</div></div>
    </div>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;">
      <a href="/admin/leiloes.html" class="btn btn-primary">Gerenciar Leilões</a>
      <a href="/admin/usuarios.html" class="btn btn-outline">Usuários</a>
      <button class="btn btn-success" onclick="abrirCriarLeilao()">+ Novo Leilão</button>
    </div>
    <h2 style="color:#1e3a5f;margin-bottom:1rem;">Últimos Leilões</h2>
    <div id="admin-leiloes"><div class="loading">Carregando</div></div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="modal" id="modal-leilao">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fecharModal('modal-leilao')">&times;</button>
      <h2 id="modal-leilao-title">Novo Leilão</h2>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="l-titulo" class="form-control">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="l-descricao" class="form-control" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Commoditie</label>
        <select id="l-comoditie" class="form-control"></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="l-quantidade" class="form-control" value="1">
        </div>
        <div class="form-group">
          <label>Preço Inicial (R$)</label>
          <input type="number" id="l-preco" class="form-control" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label>Valor mínimo por lance (R$) - opcional</label>
        <input type="number" id="l-min-lance" class="form-control" step="0.01">
      </div>
      <div class="form-group">
        <label>Data de término</label>
        <input type="datetime-local" id="l-data-fim" class="form-control">
      </div>
      <div id="leilao-status"></div>
      <button class="btn btn-success" onclick="salvarLeilao()" style="width:100%;" id="btn-salvar-leilao">Criar Leilão</button>
    </div>
  </div>

  <script src="/static/js/api-client.js"></script>
  <script src="/static/js/helpers.js"></script>
  <script src="/static/js/components.js"></script>
  <script>
    let comods = [];
    let editId = null;

    async function init() {
      const user = JSON.parse(localStorage.getItem('lcm_user') || '{}');
      if (!API.token || user.nivel !== 'admin') { window.location.href = '/admin/login.html'; return; }
      comods = await API.getComodities();
      const sel = document.getElementById('l-comoditie');
      sel.innerHTML = comods.map(c => `<option value="${html(c.id)}">${html(c.icone)} ${html(c.nome)}</option>`).join('');
      const fim = new Date(Date.now() + 7*24*60*60*1000);
      document.getElementById('l-data-fim').value = fim.toISOString().slice(0, 16);
      await Promise.all([carregarStats(), carregarLeiloes()]);
    }

    async function carregarStats() {
      const r = await API.listLeiloes({});
      const leiloes = r.data || [];
      const ativos = leiloes.filter(l => l.status === 'ativo');
      const totalLances = leiloes.reduce((acc, l) => acc + (parseInt(l.total_lances) || 0), 0);
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="numero">${leiloes.length}</div><div class="rotulo">Total Leilões</div></div>
        <div class="stat-card"><div class="numero">${ativos.length}</div><div class="rotulo">Ativos</div></div>
        <div class="stat-card"><div class="numero">${totalLances}</div><div class="rotulo">Total Lances</div></div>
        <div class="stat-card"><div class="numero">${comods.length}</div><div class="rotulo">Commodities</div></div>`;
    }

    async function carregarLeiloes() {
      const r = await API.adminLeiloes();
      const leiloes = r.data || [];
      document.getElementById('admin-leiloes').innerHTML = leiloes.length
        ? `<table>
          <thead><tr><th>Título</th><th>Commoditie</th><th>Preço Atual</th><th>Lances</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>${leiloes.map(l => `
            <tr>
              <td><a href="/paginas/leilao.html?id=${html(l.id)}">${html(l.titulo)}</a></td>
              <td>${html(l.comoditie_nome)}</td>
              <td style="font-weight:bold;">R$ ${parseFloat(l.preco_atual).toFixed(2)}</td>
              <td>${l.total_lances || 0}</td>
              <td><span class="tag ${l.status === 'ativo' ? 'tag-ativo' : 'tag-encerrado'}">${html(l.status)}</span></td>
              <td>
                <button class="btn btn-outline" style="padding:0.3rem 0.8rem;font-size:0.85rem;" onclick="editarLeilao('${html(l.id)}')">Editar</button>
                <button class="btn btn-danger" style="padding:0.3rem 0.8rem;font-size:0.85rem;" onclick="encerrarLeilao('${html(l.id)}')">Encerrar</button>
              </td>
            </tr>`).join('')}</tbody>
        </table>` : '<p style="color:#888;">Nenhum leilão criado</p>';
    }

    function abrirCriarLeilao() {
      editId = null;
      document.getElementById('modal-leilao-title').textContent = 'Novo Leilão';
      document.getElementById('btn-salvar-leilao').textContent = 'Criar Leilão';
      document.getElementById('l-titulo').value = '';
      document.getElementById('l-descricao').value = '';
      document.getElementById('l-quantidade').value = '1';
      document.getElementById('l-preco').value = '';
      document.getElementById('l-min-lance').value = '';
      document.getElementById('leilao-status').innerHTML = '';
      const fim = new Date(Date.now() + 7*24*60*60*1000);
      document.getElementById('l-data-fim').value = fim.toISOString().slice(0, 16);
      document.getElementById('modal-leilao').classList.add('active');
    }

    async function editarLeilao(id) {
      const l = await API.getLeilao(id);
      editId = id;
      document.getElementById('modal-leilao-title').textContent = 'Editar Leilão';
      document.getElementById('btn-salvar-leilao').textContent = 'Salvar';
      document.getElementById('l-titulo').value = l.titulo;
      document.getElementById('l-descricao').value = l.descricao || '';
      document.getElementById('l-comoditie').value = l.comoditie_id;
      document.getElementById('l-quantidade').value = l.quantidade;
      document.getElementById('l-preco').value = l.preco_inicial;
      document.getElementById('l-min-lance').value = l.valor_minimo_lance || '';
      document.getElementById('l-data-fim').value = new Date(l.data_fim).toISOString().slice(0, 16);
      document.getElementById('leilao-status').innerHTML = '';
      document.getElementById('modal-leilao').classList.add('active');
    }

    async function salvarLeilao() {
      const data = {
        titulo: document.getElementById('l-titulo').value.trim(),
        descricao: document.getElementById('l-descricao').value.trim(),
        comoditie_id: document.getElementById('l-comoditie').value,
        quantidade: parseFloat(document.getElementById('l-quantidade').value),
        preco_inicial: parseFloat(document.getElementById('l-preco').value),
        valor_minimo_lance: parseFloat(document.getElementById('l-min-lance').value) || null,
        data_fim: new Date(document.getElementById('l-data-fim').value).toISOString(),
      };
      if (!data.titulo || !data.comoditie_id || !data.preco_inicial) {
        document.getElementById('leilao-status').innerHTML = '<div class="alert alert-error">Preencha título, commodity e preço</div>';
        return;
      }
      const r = editId ? await API.updateLeilao({ ...data, id: editId }) : await API.criarLeilao(data);
      if (r.success) {
        document.getElementById('leilao-status').innerHTML = '<div class="alert alert-success">Leilão salvo!</div>';
        setTimeout(() => { fecharModal('modal-leilao'); carregarLeiloes(); carregarStats(); }, 500);
      } else {
        document.getElementById('leilao-status').innerHTML = '<div class="alert alert-error">' + (r.error || 'Erro') + '</div>';
      }
    }

    async function encerrarLeilao(id) {
      if (!confirm('Tem certeza que deseja encerrar este leilão?')) return;
      const r = await API.updateLeilao({ id, status: 'encerrado' });
      if (r.success) { carregarLeiloes(); carregarStats(); }
    }

    function fecharModal(id) { document.getElementById(id).classList.remove('active'); }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
