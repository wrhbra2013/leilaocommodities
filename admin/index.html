<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Leilão Commodities</title>
  <link rel="stylesheet" href="../static/css/style.css">
  <script>var basePath = '../';</script>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="main-content">
    <h1 class="page-title-lg">Painel Administrativo</h1>
    <div class="stats-grid" id="stats">
      <div class="stat-card"><div class="loading">Carregando</div></div>
    </div>
    <div class="flex-row mb-lg">
      <a href="leiloes.html" class="btn btn-primary">Gerenciar Leilões</a>
      <a href="usuarios.html" class="btn btn-outline">Usuários</a>
      <button class="btn btn-success" onclick="abrirCriarLeilao()">+ Novo Leilão</button>
    </div>
    <h2 class="page-title mb-md">Últimos Leilões</h2>
    <div id="admin-leiloes"><div class="loading">Carregando</div></div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="modal" id="modal-leilao">
    <div class="modal-content">
      <button class="btn-fechar" onclick="fecharModal('modal-leilao')">&times;</button>
      <h2 id="modal-leilao-title">Novo Leilão</h2>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="l-titulo" class="form-control">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="l-descricao" class="form-control" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Commoditie</label>
        <select id="l-comoditie" class="form-control"></select>
      </div>
      <div class="flex-row gap-md">
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="l-quantidade" class="form-control" value="1" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Preço Inicial (R$)</label>
          <input type="number" id="l-preco" class="form-control" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label>Valor mínimo por lance (R$) - opcional</label>
        <input type="number" id="l-min-lance" class="form-control" step="0.01" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>Data de término</label>
        <input type="datetime-local" id="l-data-fim" class="form-control">
      </div>
      <div id="leilao-status"></div>
      <button class="btn btn-success w-full" onclick="salvarLeilao()" id="btn-salvar-leilao">Criar Leilão</button>
    </div>
  </div>

  <script src="../static/js/api-client.js"></script>
  <script src="../static/js/helpers.js"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/admin-modal.js"></script>
  <script>
    let comods = [];

    async function init() {
      const user = JSON.parse(localStorage.getItem('lcm_user') || '{}');
      if (!API.token || user.nivel !== 'admin') { window.location.href = 'login.html'; return; }
      comods = await API.getComodities();
      initAdminModal(comods);
      await Promise.all([carregarStats(), carregarLeiloes()]);
    }

    async function carregarStats() {
      const r = await API.listLeiloes({});
      const leiloes = r.data || [];
      const ativos = leiloes.filter(l => l.status === 'ativo');
      const totalLances = leiloes.reduce((acc, l) => acc + (parseInt(l.total_lances) || 0), 0);
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="numero">${leiloes.length}</div><div class="rotulo">Total Leilões</div></div>
        <div class="stat-card"><div class="numero">${ativos.length}</div><div class="rotulo">Ativos</div></div>
        <div class="stat-card"><div class="numero">${totalLances}</div><div class="rotulo">Total Lances</div></div>
        <div class="stat-card"><div class="numero">${comods.length}</div><div class="rotulo">Commodities</div></div>`;
    }

    async function carregarLeiloes() {
      const r = await API.adminLeiloes();
      const leiloes = r.data || [];
      document.getElementById('admin-leiloes').innerHTML = leiloes.length
        ? `<table>
          <thead><tr><th>Título</th><th>Commoditie</th><th>Preço Atual</th><th>Lances</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>${leiloes.map(l => `
            <tr>
              <td><a href="../paginas/leilao.html?id=${encodeURIComponent(l.id)}">${html(l.titulo)}</a></td>
              <td>${html(l.comoditie_nome)}</td>
              <td class="text-success">R$ ${parseFloat(l.preco_atual).toFixed(2)}</td>
              <td>${l.total_lances || 0}</td>
              <td><span class="tag ${l.status === 'ativo' ? 'tag-ativo' : 'tag-encerrado'}">${html(l.status)}</span></td>
              <td>
                <button class="btn btn-outline btn-xs" onclick="editarLeilao('${l.id}')">Editar</button>
                <button class="btn btn-danger btn-xs" onclick="encerrarLeilao('${l.id}')">Encerrar</button>
              </td>
            </tr>`).join('')}</tbody>
        </table>` : '<p class="text-muted">Nenhum leilão criado</p>';
    }

    function abrirCriarLeilao() { modalAbrirCriar(); }

    async function editarLeilao(id) { modalEditar(id); }

    async function salvarLeilao() { modalSalvar(() => { carregarLeiloes(); carregarStats(); }); }

    async function encerrarLeilao(id) {
      const ok = await modalEncerrar(id);
      if (ok) { carregarLeiloes(); carregarStats(); }
    }

    function fecharModal(id) { modalFechar(); }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
